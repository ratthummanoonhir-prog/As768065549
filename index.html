<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AS7 68065549 Ratthummanoon Hirunon</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* ลบ margin */
body {
    margin: 0;
    overflow: hidden;
    font-family: sans-serif;
}

/* ===== วิดีโอพื้นหลัง ===== */
#bgVideo {
    position: fixed;
    right: 0;
    bottom: 0;
    min-width: 100%;
    min-height: 100%;
    object-fit: cover;
    z-index: -1;
}

/* ทำ overlay ให้มืดลง */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    z-index: -1;
}

/* เนื้อหากลางจอ */
.main-container {
    height: calc(100vh - 56px);
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* กล่องฟอร์ม */
.form-box {
    width: 420px;
    background: rgba(255,255,255,0.9);
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* ปุ่มล่าง */
.video-control {
    position: absolute;
    bottom: 30px;
    width: 100%;
    text-align: center;
}

</style>
</head>

<body>

<!-- วิดีโอพื้นหลัง -->
<video autoplay muted loop id="bgVideo">
    <source src="video/203923-922675870_medium.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <span class="navbar-brand">Ratthummanoon Hirunon</span>
  </div>
</nav>

<div class="main-container">

    <div class="form-box">
        <h3 class="text-center mb-4">แบบฟอร์มลงทะเบียน</h3>

        <form>
            <div class="mb-3">
                <label>ชื่อ-นามสกุล:</label>
                <input type="text" class="form-control">
            </div>

            <div class="mb-3">
                <label>อีเมล:</label>
                <input type="email" class="form-control">
            </div>

            <div class="mb-3">
                <label>รหัสผ่าน:</label>
                <input type="password" class="form-control">
            </div>

            <div class="mb-3">
                <label>เพศ:</label><br>
                <input type="radio" name="gender"> ชาย
                <input type="radio" name="gender" class="ms-3"> หญิง
            </div>

            <div class="mb-3">
                <label>ตำแหน่ง:</label>
                <select class="form-select">
                    <option>Web Development</option>
                    <option>Designer</option>
                    <option>Marketing</option>
                </select>
            </div>

            <div class="text-center mt-4">
                <button class="btn btn-primary px-4">ลงทะเบียน</button>
                <button type="reset" class="btn btn-danger px-4">ล้างข้อมูล</button>
            </div>
        </form>
    </div>

    <!-- ปุ่มควบคุมวิดีโอ -->
    <div class="video-control">
        <button class="btn btn-dark border-warning text-warning px-4" onclick="playVideo()">Play</button>
        <button class="btn btn-dark border-danger text-danger px-4 ms-2" onclick="pauseVideo()">Stop</button>
    </div>

</div>

<script>
var video = document.getElementById("bgVideo");

function playVideo() {
    video.play();
}

function pauseVideo() {
    video.pause();
}
</script>

</body>
</html>
